# ==============================================
# Airtel USSD Gateway Configuration
# ==============================================

# --- SMPP Bind Connections ---
smpp.hosts=10.0.0.1,10.0.0.2,10.0.0.3,10.0.0.4
smpp.port=2775
smpp.systemId=your_system_id
smpp.password=your_password

# --- USSD Settings ---
ussd.serviceType=USSD
ussd.serviceCode=5045
ussd.processUrl=http://localhost:8080/ussd

# Set to true for offline testing (returns hardcoded menu, skips HTTP)
#ussd.testMode=true

# Push HTTP server for client-initiated USSD
ussd.push.port=8020

# Push method: smpp (default) or http
ussd.push.method=smpp

# HTTP push settings (used when method=http) — Type 3 only
ussd.push.http.ip=10.0.0.1
ussd.push.http.port=8080
ussd.push.http.userid=app1
ussd.push.http.password=app1pwd
ussd.push.http.serviceCode=5045

# --- Workers ---
worker.threads=128
